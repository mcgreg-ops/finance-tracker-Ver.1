<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowTrack - MG Labs</title>
  <link rel="icon" href="logo.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 10px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 15px;
      border-radius: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 30px;
      height: 30px;
    }

    h3 {
      margin-top: 20px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    input, select {
      padding: 10px;
    }

    button {
      padding: 10px;
      margin-top: 5px;
    }

    .results {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="logo.png" class="logo">
    <div>
      <strong>FlowTrack</strong><br>
      <small>MG Labs</small>
    </div>
  </div>

  <h3>Earnings</h3>
  <div id="earnings-list"></div>
  <button onclick="addEarning()">+ Add Earning</button>

  <h3>Expenses</h3>
  <div id="expenses-list"></div>
  <button onclick="addExpense()">+ Add Expense</button>

  <h3>Savings</h3>
  <div id="savings-list"></div>
  <button onclick="addSaving()">+ Add Saving</button>

  <div class="results">
    <p>Total Earnings: <span id="total-earnings">0</span></p>
    <p>Total Expenses: <span id="total-expenses">0</span></p>
    <p>Total Savings: <span id="total-savings">0</span></p>
    <p>Remaining: <span id="remaining">0</span></p>
    <div id="category-totals"></div>
  </div>

  <button onclick="exportCSV()">Export</button>

</div>

<script src="script.js"></script>

</body>
</html>

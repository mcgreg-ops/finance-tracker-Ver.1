<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowTrack V.1- MG Labs</title>
  <link rel="icon" href="logo.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 10px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 15px;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    h3 {
      margin-top: 20px;
    }

    /* ROW (mobile first) */
    .row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
    }

    /* BUTTONS */
    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    /* Main buttons full width */
    .add-btn,
    .export-btn {
      width: 100%;
      background: #f0f0f0;
    }

    .export-btn {
      background: #28a745;
      color: white;
      margin-top: 10px;
    }

    /* DELETE BUTTON FIX */
    .delete-btn {
      width: auto;
      background: #ff4d4d;
      color: white;
      padding: 8px 12px;
      align-self: flex-start; /* 👈 prevents full stretch */
    }

    .results {
      margin-top: 20px;
      background: #f8f9fb;
      padding: 12px;
      border-radius: 10px;
    }

    /* DESKTOP */
    @media (min-width: 600px) {
      .row {
        flex-direction: row;
        align-items: center;
      }

      .row input,
      .row select {
        flex: 1;
      }

      .delete-btn {
        align-self: center;
      }

      .logo {
        width: 40px;
        height: 40px;
      }
    }

    #category-totals {
  margin-top: 10px;
  border-top: 1px solid #ddd;
  padding-top: 8px;
}

#category-totals p {
  margin: 5px 0;
  font-size: 14px;
}
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="logo.png" class="logo">
    <div>
      <strong>FlowTrack</strong><br>
      <small>MG Labs</small>
    </div>
  </div>

  <!-- Earnings -->
  <h3>Earnings</h3>
  <div id="earnings-list"></div>
  <button class="add-btn" onclick="addEarning()">+ Add Earning</button>

  <!-- Expenses -->
  <h3>Expenses</h3>
  <div id="expenses-list"></div>
  <button class="add-btn" onclick="addExpense()">+ Add Expense</button>

  <!-- Savings -->
  <h3>Savings</h3>
  <div id="savings-list"></div>
  <button class="add-btn" onclick="addSaving()">+ Add Saving</button>

  <!-- Results -->
  <div class="results">
    <p>Total Earnings: <span id="total-earnings">0</span></p>
    <p>Total Expenses: <span id="total-expenses">0</span></p>
    <p>Total Savings: <span id="total-savings">0</span></p>
    <p>Remaining: <span id="remaining">0</span></p>
    <h4>Category Totals</h4>
    
<div id="category-totals"></div>
  </div>

  <button class="export-btn" onclick="exportCSV()">Export</button>

</div>

<script src="script.js"></script>

</body>
</html>

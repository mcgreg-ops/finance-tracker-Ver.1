<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      flex: 1;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .delete-btn {
      background: red;
      color: white;
      border: none;
    }

    .add-btn {
      width: 100%;
      margin: 10px 0;
    }

    .results {
      margin-top: 20px;
    }

    .export-btn {
      background: green;
      color: white;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Finance Tracker</h1>

  <h3>Earnings</h3>
  <div id="earnings-list"></div>
  <button class="add-btn" onclick="addEarning()">+ Add Earning</button>

  <h3>Expenses</h3>
  <div id="expenses-list"></div>
  <button class="add-btn" onclick="addExpense()">+ Add Expense</button>

  <div class="results">
    <h3>Results</h3>
    <p>Total Earnings: <span id="total-earnings">0</span></p>
    <p>Total Expenses: <span id="total-expenses">0</span></p>
    <p>Remaining: <span id="remaining">0</span></p>
  </div>

  <button onclick="calculate()">Calculate</button>
  <button class="export-btn" onclick="exportCSV()">Export to Excel</button>
</div>

<script src="script.js"></script>
</body>
</html>

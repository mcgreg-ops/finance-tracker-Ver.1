<style>
  body {
    font-family: Arial, sans-serif;
    background: #eef2f7;
    margin: 0;
    padding: 10px;
  }

  .container {
    max-width: 500px;
    margin: auto;
    background: #fff;
    padding: 15px;
    border-radius: 16px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  }

  h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 15px;
  }

  h3 {
    margin-top: 20px;
    font-size: 16px;
  }

  /* HEADER (FIXED) */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
  }

  .logo {
    width: 32px;        /* 👈 SMALLER for mobile */
    height: 32px;
    object-fit: contain;
  }

  .app-name {
    margin: 0;
    font-size: 18px;
  }

  .company-name {
    margin: 0;
    font-size: 12px;
    color: gray;
  }

  /* MOBILE FIRST STACK */
  .row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 12px;
  }

  input, select {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
    width: 100%;
    box-sizing: border-box;
  }

  button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    width: 100%;
    cursor: pointer;
  }

  .delete-btn {
    background: #ff4d4d;
    color: white;
  }

  .add-btn {
    background: #f0f0f0;
  }

  .add-btn:hover {
    background: #ddd;
  }

  .export-btn {
    background: #28a745;
    color: white;
    margin-top: 10px;
  }

  .results {
    background: #f8f9fb;
    padding: 15px;
    border-radius: 12px;
    margin-top: 20px;
  }

  .results p {
    margin: 6px 0;
    font-size: 14px;
  }

  /* DESKTOP IMPROVEMENT */
  @media (min-width: 600px) {
    .row {
      flex-direction: row;
    }

    input, select {
      flex: 1;
    }

    .delete-btn {
      width: 60px;
    }

    /* Slightly bigger logo on desktop */
    .logo {
      width: 45px;
      height: 45px;
    }
  }
</style>

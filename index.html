<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#4a90e2">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker</title>

  <style>
  body {
    font-family: Arial, sans-serif;
    background: #eef2f7;
    margin: 0;
    padding: 10px;
  }

  .container {
    max-width: 500px;
    margin: auto;
    background: #fff;
    padding: 15px;
    border-radius: 16px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  }

  h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 15px;
  }

  h3 {
    margin-top: 20px;
    font-size: 16px;
  }

  /* MOBILE FIRST STACK */
  .row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 12px;
  }

  input, select {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
    width: 100%;
    box-sizing: border-box;
  }

  button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    width: 100%;
    cursor: pointer;
  }

  .delete-btn {
    background: #ff4d4d;
    color: white;
  }

  .add-btn {
    background: #f0f0f0;
  }

  .add-btn:hover {
    background: #ddd;
  }

  .export-btn {
    background: #28a745;
    color: white;
    margin-top: 10px;
  }

  .results {
    background: #f8f9fb;
    padding: 15px;
    border-radius: 12px;
    margin-top: 20px;
  }

  .results p {
    margin: 6px 0;
    font-size: 14px;
  }

  /* DESKTOP IMPROVEMENT */
  @media (min-width: 600px) {
    .row {
      flex-direction: row;
    }

    input, select {
      flex: 1;
    }

    .delete-btn {
      width: 60px;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>Finance Tracker</h1>

  <!-- Earnings -->
  <h3>Earnings</h3>
  <div id="earnings-list"></div>
  <button class="add-btn" onclick="addEarning()">+ Add Earning</button>

  <!-- Expenses -->
  <h3>Expenses</h3>
  <div id="expenses-list"></div>
  <button class="add-btn" onclick="addExpense()">+ Add Expense</button>

  <!-- Results -->
  <div class="results">
    <h3>Results</h3>
    <p>Total Earnings: <span id="total-earnings">0</span></p>
    <p>Total Expenses: <span id="total-expenses">0</span></p>
    <p>Remaining: <span id="remaining">0</span></p>
  </div>

  <button class="export-btn" onclick="exportCSV()">Export to Excel</button>
</div>

<!-- IMPORTANT -->
<script src="script.js" defer></script>

</body>
</html>
